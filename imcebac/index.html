<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculadora de IMC</title>
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <div class="bg-shapes">
    <div class="shape shape-1"></div>
    <div class="shape shape-2"></div>
    <div class="shape shape-3"></div>
  </div>

  <main class="card">
    <header class="card__header">
      <div class="logo">&#9670;</div>
      <h1 class="card__title">Calculadora<br><span>de IMC</span></h1>
      <p class="card__subtitle">Índice de Massa Corporal</p>
    </header>

    <section class="form">
      <div class="input-group">
        <label for="peso">Peso</label>
        <div class="input-wrapper">
          <input
            type="number"
            id="peso"
            placeholder="Ex: 70"
            min="1"
            max="300"
            step="0.1"
          />
          <span class="unit">kg</span>
        </div>
      </div>

      <div class="input-group">
        <label for="altura">Altura</label>
        <div class="input-wrapper">
          <input
            type="number"
            id="altura"
            placeholder="Ex: 1.75"
            min="0.5"
            max="3"
            step="0.01"
          />
          <span class="unit">m</span>
        </div>
      </div>

      <button id="btn-calcular" onclick="calcularIMC()">
        <span>Calcular IMC</span>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </section>

    <section class="resultado" id="resultado" aria-live="polite">
      <div class="resultado__imc">
        <span class="resultado__label">Seu IMC</span>
        <p id="valor-imc" class="resultado__valor">—</p>
      </div>
      <div class="resultado__classificacao">
        <p id="classificacao" class="resultado__tag">Preencha os campos acima</p>
      </div>
      <div class="barra-container">
        <div class="barra-track">
          <div class="barra-fill" id="barra-fill"></div>
          <div class="barra-marker" id="barra-marker"></div>
        </div>
        <div class="barra-labels">
          <span>Abaixo</span>
          <span>Normal</span>
          <span>Sobrepeso</span>
          <span>Obeso</span>
        </div>
      </div>
    </section>

    <section class="tabela">
      <h2 class="tabela__titulo">Tabela de Classificação</h2>
      <ul class="tabela__lista">
        <li><span class="dot dot--azul"></span><span class="faixa">Abaixo do peso</span><span class="valor-faixa">&lt; 18,5</span></li>
        <li><span class="dot dot--verde"></span><span class="faixa">Peso normal</span><span class="valor-faixa">18,5 – 24,9</span></li>
        <li><span class="dot dot--amarelo"></span><span class="faixa">Sobrepeso</span><span class="valor-faixa">25 – 29,9</span></li>
        <li><span class="dot dot--laranja"></span><span class="faixa">Obesidade I</span><span class="valor-faixa">30 – 34,9</span></li>
        <li><span class="dot dot--vermelho"></span><span class="faixa">Obesidade II</span><span class="valor-faixa">35 – 39,9</span></li>
        <li><span class="dot dot--roxo"></span><span class="faixa">Obesidade III</span><span class="valor-faixa">≥ 40</span></li>
      </ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
